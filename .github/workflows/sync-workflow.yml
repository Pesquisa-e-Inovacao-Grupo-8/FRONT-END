name: Sync branches after release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-homolog:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - run: |
          git checkout -b sync-main-homolog origin/main
          git push origin sync-main-homolog

      - uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: sync-main-homolog
          base: homolog
          title: "Sync main → homolog"
          body: "Automatic sync"
          delete-branch: true

  sync-develop:
    needs: sync-homolog
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - run: |
          git checkout -b sync-main-develop origin/main
          git push origin sync-main-develop

      - uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: sync-main-develop
          base: develop
          title: "Sync main → develop"
          body: "Automatic sync"
          delete-branch: true
